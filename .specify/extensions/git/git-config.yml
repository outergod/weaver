# Git Branching Workflow Extension Configuration
# Copied to .specify/extensions/git/git-config.yml on install

# Branch numbering strategy: "sequential" (001, 002, ...) or "timestamp" (YYYYMMDD-HHMMSS)
branch_numbering: sequential

# Commit message used by `git commit` during repository initialization
init_commit_message: "chore(specify): initial commit"

# Auto-commit before/after core commands.
# Set "default" to enable for all commands, then override per-command.
# Each key can be true/false. Message is customizable per-command.
# NOTE: per-event `enabled: true` is required because the parser in
# scripts/bash/auto-commit.sh treats "section exists without enabled" as
# opted-out rather than falling back to `default`.
#
# Message style: Conventional Commits 1.0 (per L2 constitution Additional
# Constraints). `docs(specify): …` for documentation-artifact commits;
# `chore(specify): …` for progress checkpoints and housekeeping.
auto_commit:
  default: true
  before_clarify:
    enabled: true
    message: "chore(specify): save progress before clarification"
  before_plan:
    enabled: true
    message: "chore(specify): save progress before planning"
  before_tasks:
    enabled: true
    message: "chore(specify): save progress before task generation"
  before_implement:
    enabled: true
    message: "chore(specify): save progress before implementation"
  before_checklist:
    enabled: true
    message: "chore(specify): save progress before checklist"
  before_analyze:
    enabled: true
    message: "chore(specify): save progress before analysis"
  before_taskstoissues:
    enabled: true
    message: "chore(specify): save progress before issue sync"
  after_constitution:
    enabled: true
    message: "docs(specify): add project constitution"
  after_specify:
    enabled: true
    message: "docs(specify): add specification"
  after_clarify:
    enabled: true
    message: "docs(specify): clarify specification"
  after_plan:
    enabled: true
    message: "docs(specify): add implementation plan"
  after_tasks:
    enabled: true
    message: "docs(specify): add tasks"
  after_implement:
    enabled: true
    message: "chore(specify): implementation progress"
  after_checklist:
    enabled: true
    message: "docs(specify): add checklist"
  after_analyze:
    enabled: true
    message: "docs(specify): add analysis report"
  after_taskstoissues:
    enabled: true
    message: "chore(specify): sync tasks to issues"
